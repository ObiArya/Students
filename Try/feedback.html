<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Feedback - Student’s Review</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="feedback-styles.css">
</head>
<body>
    <section class="hero">
        <div class="container">
            <h1>Submit Your Feedback</h1>
            <p>Share your thoughts anonymously and help improve our school</p>
        </div>
    </section>

    <section class="form-section">
        <div class="container">
            <form id="feedbackForm">
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category" required>
                        <option value="">Select a category</option>
                        <option value="teaching">Teaching & Learning</option>
                        <option value="facilities">School Facilities</option>
                        <option value="programs">School Programs</option>
                        <option value="services">SC Work</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="description">Describe the Issue</label>
                    <textarea id="description" name="description" rows="5" placeholder="Please provide details..." required></textarea>
                </div>
                <a href="thankyou.html" class="btn" required>Submit Feedback</a>
            </form>
        </div>
    </section>

    <script src="feedback-script.js"></script>
</body>
</html>
